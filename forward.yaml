# ═══════════ FORWARD (бумажная торговля спредов) — конфигурация ═══════════
# Каждое поле логируется хешем конфига в каждое решение и сделку.

paper:
  cash_per_venue_usd: 5000       # стартовый бумажный кэш на каждой бирже
  notional_usd: 100              # целевой размер ноги на сделку
  min_notional_usd: 20           # меньше — отказ capacity
  top_book_frac: 0.5             # берём не больше этой доли видимой вершины стакана

entry:
  net_min_pct: 0.10              # чистый спред (после 4 тейкер-комиссий) для входа
  retry_ms: 1000                 # переоценка живого события не чаще раза в секунду
  carry_gate: true               # ФАНДИНГ-ГЕЙТ: вход только при carry >= 0
                                 # (данные NL2/Tokyo: сделки против carry теряют больше;
                                 # спред без попутного фандинга = рынок видит риск)
  momentum_guard_pct: 0.05       # спред вырос на >= N п.п. за последние ~1-3с ->
                                 # дислокация ещё в развитии, вход = ловля ножа
                                 # (источник stop_widen -$22.5/эпоху); 0 = выкл

exit:
  converge_gross_pct: 0.05       # валовый спред сошёлся ниже — закрываем обе ноги
  converged_style: maker         # ПРАВИЛО 1 (E1): плановый выход ПАССИВНЫЙ (maker|taker для A/B)
  confirm_ms: 300                # ПРАВИЛО 1 (E2): схождение должно продержаться N мс
  min_quote_usd: 10              # E2: триггерные котировки не пустышки (>= $ на вершине)
  stop_widen_pct: 0              # ЦЕНОВОЙ СТОП ОТКЛЮЧЁН (22.07, 0 = выкл): резал позиции,
                                 # 58% которых сошлись бы за 10 мин / 67% за час, фиксируя
                                 # -$22.5/эпоху; расширение спреда при carry>=0 и дельта-
                                 # нейтральности — не риск, а ожидание. Вместо цены стоят
                                 # гипотезные выходы: funding_bleed, kill-switch, таймаут,
                                 # seq_ttl, дневной лимит. Вернуть = задать порог > 0
  timeout_min: 180               # бюджет удержания; по истечении — пассивный выход
  funding_extend_mult: 4         # carry>0 в момент проверки -> бюджет x4 (до 12ч):
                                 # позиция с попутным фандингом ЗАРАБАТЫВАЕТ от ожидания
  passive_ttl_min: 10            # пассивная закрывающая лимитка не налилась — эскалация в тейкер
                                 # (только для НЕпоследовательного режима, см. sequential)
  funding_eat_frac: 0.5          # carry против съел эту долю ожидаемого захвата — пассивный выход
                                 # (carry В ПЛЮС — держим без ограничений: ожидание платит нам)
  sequential: true               # ПОСЛЕДОВАТЕЛЬНЫЙ выход (22.07): одна пассивная нога
                                 # (на passive-only бирже, иначе где шире внутренний спред),
                                 # налив -> МГНОВЕННЫЙ тейкер-хедж второй. Убирает голое
                                 # направленное окно между ногами (замерено: p90 = 8.3 мин,
                                 # 31% сделок голыми >1 мин); false = старые две лимитки
  seq_ttl_min: 180               # предел ожидания пассивной ноги посл. выхода: позиция всё
                                 # это время ЗАХЕДЖИРОВАНА, спешить некуда (p99 схождения
                                 # 8.2 мин); истёк — обе ноги тейкером
  chase_max_bps: 5               # ПОЛ ПРЕСЛЕДОВАНИЯ: закрывающая лимитка уходит от цены
                                 # постановки не дальше N б.п. (погоня без пола ловила дно
                                 # отката: -10.3 б.п./ногу в среднем) и никогда — за уровень
                                 # безубытка сделки, когда тот достижим; -1 = пола нет

risk:
  max_concurrent: 80             # одновременных связок (бумага: тест-режим, слот-голод
                                 # душил воронку — 11.9k отказов за эпоху 21.07)
  per_venue_exposure_usd: 4000   # суммарный нотионал ноги на биржу (поднят вместе со
                                 # слотами: при $50 среднем нотионале 1000 вязала ~20 позиций)
  pair_cooldown_s: 60            # пауза на (символ, пара бирж) после закрытия
  legrisk_cooldown_s: 300        # пауза после leg-risk инцидента
  daily_loss_limit_usd: 500      # дневной лимит (поднят 150->500: на бумаге данные дороже
                                 # виртуальных денег; 21.07 лимит 150 заморозил полдня сбора)
  link_kill:                     # kill-switch связок-паразитов (ужесточён 22.07:
    min_trades: 8                # LAB gate-okx -$6/17 сделок проскакивал под старым
    max_pnl_usd: -1.0            # порогом 20 сделок; топ-10 худших = 40% всего минуса)
    window_min: 720              # скользящее окно, мин
    pause_min: 360               # длительность паузы, мин

latency:
  default_one_way_ms: 80         # пока RTT-проба не измерила биржу
  quiet_resolve_ms: 500          # тихий стакан: налив решается по последней котировке
  taker_fill_ttl_ms: 3000        # ПАКЕТ 2: частичный тейкер добивает остаток след. котировками;
                                 # старше TTL — принудительное закрытие остатка (инцидент)
  rtt_probe_samples: 3           # ПАКЕТ 2: RTT-проба серией, берём min (тёплое соединение),
                                 # иначе раз-в-минуту мерялся холодный TLS-хендшейк (gate +500мс)

scheme:                          # динамический выбор схемы исполнения по связке
  mode: auto                     # auto | taker | maker (принудительно)
  osc_window_min: 10             # окно наблюдения профиля связки
  osc_min_events: 3              # событий за окно -> связка «осциллятор» -> maker-first
                                 # реже -> «скоротечный прокол» -> taker-taker

maker:                           # параметры maker-first (пассивная нога на дешёвой бирже)
  net_min_pct: 0.15              # ожидаемый чистый от НАШЕЙ цены; поднят 0.05->0.15 по
                                 # данным NL 20.07: маркауты медиана -5.3бп / p10 -82бп —
                                 # adverse selection съедал тонкие входы (904 сделки -$22)
  scratch_bps: 0                 # ОТКЛЮЧЁН (Tokyo 22.07: срабатывал на 48% наливов и
                                 # стоил -$26/эпоху — резал живые сделки; вернём мягче
                                 # после пассивной версии выхода, если данные попросят)
  passive_only_venues:           # «только-пассивные» биржи: агрессивные ордера сюда не
    - bybit                      # шлём (промах 49-59%, маркаут хеджа -17..-22 бп) —
    - okx                        # пассивная нога встаёт НА них, хедж на надёжной бирже;
                                 # тейкер-тейкер для связок с такой ногой запрещён
  cancel_net_pct: 0.00           # ожидаемый чистый упал ниже — снимаем лимитку
  ttl_s: 45                      # максимум жизни пассивной заявки
  markout_s: 10                  # замер adverse selection после налива
