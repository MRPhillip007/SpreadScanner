# ═══════════ FORWARD (бумажная торговля спредов) — конфигурация ═══════════
# Каждое поле логируется хешем конфига в каждое решение и сделку.

paper:
  cash_per_venue_usd: 5000       # стартовый бумажный кэш на каждой бирже
  notional_usd: 100              # целевой размер ноги на сделку
  min_notional_usd: 20           # меньше — отказ capacity
  top_book_frac: 0.5             # берём не больше этой доли видимой вершины стакана

entry:
  net_min_pct: 0.10              # чистый спред (после 4 тейкер-комиссий) для входа
  retry_ms: 1000                 # переоценка живого события не чаще раза в секунду

exit:
  converge_gross_pct: 0.05       # валовый спред сошёлся ниже — закрываем обе ноги
  stop_widen_pct: 1.50           # спред разошёлся на столько сверх входа — стоп
  timeout_min: 30                # максимум удержания

risk:
  max_concurrent: 5              # одновременных связок
  per_venue_exposure_usd: 1000   # суммарный нотионал ноги на биржу
  pair_cooldown_s: 60            # пауза на (символ, пара бирж) после закрытия
  legrisk_cooldown_s: 300        # пауза после leg-risk инцидента
  daily_loss_limit_usd: 150      # дневной лимит убытка (бумажный)

latency:
  default_one_way_ms: 80         # пока RTT-проба не измерила биржу
  quiet_resolve_ms: 500          # тихий стакан: налив решается по последней котировке

scheme:                          # динамический выбор схемы исполнения по связке
  mode: auto                     # auto | taker | maker (принудительно)
  osc_window_min: 10             # окно наблюдения профиля связки
  osc_min_events: 3              # событий за окно -> связка «осциллятор» -> maker-first
                                 # реже -> «скоротечный прокол» -> taker-taker

maker:                           # параметры maker-first (пассивная нога на дешёвой бирже)
  net_min_pct: 0.05              # ожидаемый чистый спред от НАШЕЙ цены для постановки
  cancel_net_pct: 0.00           # ожидаемый чистый упал ниже — снимаем лимитку
  ttl_s: 45                      # максимум жизни пассивной заявки
  markout_s: 10                  # замер adverse selection после налива
